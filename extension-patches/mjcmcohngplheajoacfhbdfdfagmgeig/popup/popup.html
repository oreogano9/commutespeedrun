<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="popup.css" />
    <title>Cinematic Controls</title>
  </head>
  <body>
    <div class="controls-wrapper">
      <div class="toggle-container">
        <span class="toggle-label">Enable Cinematic</span>
        <label class="switch">
          <input type="checkbox" id="cinematicToggle" />
          <span class="slider"></span>
        </label>
      </div>
      <div class="toggle-container">
        <span class="toggle-label">Mute Previews</span>
        <label class="switch">
          <input type="checkbox" id="cinematicSound" />
          <span class="slider"></span>
        </label>
      </div>

      <div class="divider"></div>

      <a href="https://www.youtube.com" target="_blank" class="youtube-button">
        <svg
          viewBox="0 0 24 24"
          width="24"
          height="24"
          style="margin-right: 8px"
        >
          <path
            fill="currentColor"
            d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"
          />
        </svg>
        Open YouTube
      </a>
    </div>
    <script src="popup.bundle.js"></script>
  </body>
</html>
